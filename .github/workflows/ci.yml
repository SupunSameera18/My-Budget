name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  golden-suite-guard:
    name: Flag edits to golden-suite expectation files
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for golden-suite test edits
        run: |
          # Golden suites encode ratified contracts (e.g. AR-15 privacy model).
          # A diff here isn't blocked — it may be a legitimate, deliberate
          # contract change — but it must be called out for human review.
          GOLDEN_FILES="supabase/tests/rls_visibility_predicate.test.sql"
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- $GOLDEN_FILES)
          if [ -n "$CHANGED" ]; then
            echo "::warning::Golden-suite expectation file(s) changed in this PR: $CHANGED — verify this is a deliberate, ratified contract change (see file header for the AR-15 / phase-2-implementation-plan.md §1 contract) and not a silent test-weakening."
          fi

  verify:
    name: Verify (typecheck, lint, format, unit, db lint, pgTAP, e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ---- Static gates (fast; fail early) ----
      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Lint (ESLint)
        run: npm run lint

      - name: Format check (Prettier)
        run: npm run format:check

      # ---- Unit tests ----
      - name: Unit tests (Vitest)
        run: npm run test

      # ---- Supabase-backed gates ----
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase (local stack)
        run: supabase start

      - name: DB lint (supabase db lint)
        run: npm run db:lint

      - name: pgTAP tests (supabase test db)
        run: npm run db:test

      # ---- End-to-end smoke ----
      - name: Write .env.local from local Supabase
        run: |
          supabase status -o env \
            --override-name api.url=NEXT_PUBLIC_SUPABASE_URL \
            --override-name auth.anon_key=NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY \
            | grep '^NEXT_PUBLIC_' > .env.local

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: E2E smoke (Playwright)
        run: npm run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
