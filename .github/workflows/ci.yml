name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (typecheck, lint, format, unit, db lint, pgTAP, e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ---- Static gates (fast; fail early) ----
      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Lint (ESLint)
        run: npm run lint

      - name: Format check (Prettier)
        run: npm run format:check

      # ---- Unit tests ----
      - name: Unit tests (Vitest)
        run: npm run test

      # ---- Supabase-backed gates ----
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase (local stack)
        run: supabase start

      - name: DB lint (supabase db lint)
        run: npm run db:lint

      - name: pgTAP tests (supabase test db)
        run: npm run db:test

      # ---- End-to-end smoke ----
      - name: Write .env.local from local Supabase
        run: |
          supabase status -o env \
            --override-name api.url=NEXT_PUBLIC_SUPABASE_URL \
            --override-name auth.anon_key=NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY \
            | grep '^NEXT_PUBLIC_' > .env.local

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: E2E smoke (Playwright)
        run: npm run e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
