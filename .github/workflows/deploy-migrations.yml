name: Deploy Migrations

# Applies version-controlled Supabase migrations to the linked project on merge
# to main. No domain migrations exist yet (Story 1.1) — this no-ops cleanly until
# the first migration lands (Story 1.4a onward).

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"

jobs:
  deploy:
    name: Apply Supabase migrations
    runs-on: ubuntu-latest
    # Secrets are configured once the hosted Supabase project exists.
    # Until then this job is gated off so the workflow stays green.
    if: ${{ vars.SUPABASE_DEPLOY_ENABLED == 'true' }}
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push migrations
        run: supabase db push
