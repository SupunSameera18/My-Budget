<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Password reset code</title>
</head>
<body style="font-family: sans-serif; max-width: 480px; margin: 0 auto; padding: 24px; color: #243133;">
  <h2 style="font-size: 20px; margin-bottom: 8px;">Reset your password</h2>
  <p style="color: #5c6e72; margin-bottom: 24px;">
    Use the 6-character code below to reset your password. It expires in 1 hour.
  </p>
  <div style="background: #f2f6f7; border-radius: 8px; padding: 24px; text-align: center; margin-bottom: 24px;">
    <p style="font-size: 32px; font-weight: 700; letter-spacing: 0.3em; margin: 0; color: #1f7a78;">
      {{ .Token }}
    </p>
  </div>
  <p style="color: #5c6e72; font-size: 14px; margin: 0;">
    If you didn&apos;t request a password reset, you can safely ignore this email.
  </p>
</body>
</html>
